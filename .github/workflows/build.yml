name: Verify Tangem Build Without Private Repo

on:
  workflow_dispatch:

jobs:
  verify-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          repository: tangem/tangem-sdk-android
          path: tangem-sdk-android

      - name: Checkout App
        uses: actions/checkout@v4
        with:
          repository: tangem/tangem-app-android
          path: tangem-app-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build SDK and publish to local Maven
        working-directory: tangem-sdk-android
        run: ./gradlew publishToMavenLocal --no-daemon

      - name: Replace dependency version with 0.0.1
        run: |
          grep -rl 'tangemCardSdk' tangem-app-android | while read -r file; do
            sed -i 's/[0-9]\+\.[0-9]\+\.[0-9]\+/0.0.1/g' "$file"
          done

      - name: Remove maven.pkg.github.com references
        run: |
          grep -rl 'maven.pkg.github.com' tangem-app-android | while read -r file; do
            sed -i '/maven.pkg.github.com/d' "$file"
          done

      - name: Disable network access except localhost
        run: |
          sudo iptables -P OUTPUT DROP
          sudo iptables -A OUTPUT -d 127.0.0.1 -j ACCEPT
          sudo iptables -A OUTPUT -d ::1 -j ACCEPT

      - name: Build App in offline mode
        working-directory: tangem-app-android
        run: ./gradlew assembleRelease --offline --stacktrace --no-daemon
