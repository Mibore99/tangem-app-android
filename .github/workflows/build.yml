name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version variables
        id: version
        run: |
          VERSION_CODE=${GITHUB_RUN_NUMBER}
          VERSION_NAME="${GITHUB_RUN_NUMBER}-$(echo $GITHUB_SHA | cut -c1-7)"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "tag=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Inject versionCode/versionName into build.gradle.kts
        run: |
          sed -i "/defaultConfig {/a \ \ \ \ versionCode = ${VERSION_CODE}\n        versionName = \"${VERSION_NAME}\"" app/build.gradle.kts

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Keystore
        run: |
          keytool -genkeypair -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=CI, OU=Dev, O=Company, L=Earth, S=World, C=US" \
            -keypass android -storepass android -keystore release.keystore
          echo "STORE_FILE=release.keystore" >> local.properties
          echo "STORE_PASSWORD=android" >> local.properties
          echo "KEY_ALIAS=release" >> local.properties
          echo "KEY_PASSWORD=android" >> local.properties

      - name: Build APK
        run: ./gradlew assembleExternal --stacktrace

      - name: Rename APK with version
        run: |
          mkdir -p release
          APK_PATH=$(find app/build/outputs/apk/external -name "*.apk" | head -n 1)
          cp "$APK_PATH" "release/Tangem-${VERSION_NAME}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tangem-${{ env.VERSION_NAME }}
          path: release/Tangem-${{ env.VERSION_NAME }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Build ${{ steps.version.outputs.tag }}
          files: release/Tangem-${{ env.VERSION_NAME }}.apk
