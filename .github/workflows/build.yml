name: Android CI Build

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create local.properties
        run: |
          echo "gpr.user=${{ github.actor }}" >> local.properties
          echo "gpr.key=${{ secrets.GITHUB_TOKEN }}" >> local.properties

      - name: Generate temporary keystore
        run: |
          keytool -genkeypair \
            -keystore temp.keystore \
            -alias tempAlias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass tempPass \
            -keypass tempPass \
            -dname "CN=Temp,O=CI,C=US"

          echo "STORE_FILE=temp.keystore" >> local.properties
          echo "STORE_PASSWORD=tempPass" >> local.properties
          echo "KEY_ALIAS=tempAlias" >> local.properties
          echo "KEY_PASSWORD=tempPass" >> local.properties

      - name: Build APK
        run: ./gradlew assembleExternal --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-apk
          path: app/build/outputs/apk/external/**/*.apk

      - name: Delete old Release (if exists)
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: app/build/outputs/apk/external/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: vars
        run: echo "tag=$(date +'%Y%m%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Historical Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Build ${{ steps.vars.outputs.tag }}
          files: app/build/outputs/apk/external/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
