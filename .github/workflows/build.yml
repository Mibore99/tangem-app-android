name: Verify Tangem Open Source Integrity

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main project
        uses: actions/checkout@v4

      - name: Clone tangem-sdk-android
        run: |
          git clone https://github.com/tangem/tangem-sdk-android.git
          cd tangem-sdk-android
          ./gradlew publishToMavenLocal

      - name: Change artifact version to 0.0.1
        run: |
          sed -i 's/tangemCardSdk = ".*"/tangemCardSdk = "0.0.1"/' gradle/libs.versions.toml
          echo "Updated tangemCardSdk version to 0.0.1"

      - name: Remove remote maven repository
        run: |
          sed -i '/maven { url "https:\/\/maven.pkg.github.com/d' settings.gradle
          sed -i '/maven { url "https:\/\/maven.pkg.github.com/d' build.gradle

      - name: Remove token from local.properties
        run: |
          if [ -f local.properties ]; then
            sed -i '/gpr.user/d' local.properties
            sed -i '/gpr.key/d' local.properties
          fi

      - name: Disable network
        run: |
          sudo ip link set eth0 down
          sudo ip link set wlan0 down || true

      - name: Build main project without remote repo
        run: ./gradlew assembleRelease --stacktrace
